name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build React app
        working-directory: ./frontend
        run: npm run build

      - name: Install Capacitor
        working-directory: ./frontend
        run: npm install @capacitor/core @capacitor/cli @capacitor/camera @capacitor/android

      - name: Create Capacitor config if missing
        working-directory: ./frontend
        run: |
          if [ ! -f capacitor.config.json ] && [ ! -f capacitor.config.ts ]; then
            echo '{"appId":"com.receipt.manager","appName":"Receipt Manager","webDir":"build","bundledWebRuntime":false}' > capacitor.config.json
          fi

      - name: Add Android platform if missing
        working-directory: ./frontend
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        working-directory: ./frontend
        run: npx cap sync android

      - name: Install Android SDK 36
        run: |
          SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER=$(find /opt -name sdkmanager -type f 2>/dev/null | head -1)
          fi
          if [ -n "$SDKMANAGER" ]; then
            yes | $SDKMANAGER "platforms;android-36" "build-tools;36.0.0" || true
          fi

      - name: Patch Android SDK versions
        working-directory: ./frontend/android
        run: |
          sed -i 's/com.android.tools.build:gradle:8.7.2/com.android.tools.build:gradle:8.9.1/g' build.gradle
          
          if [ -f variables.gradle ]; then
            sed -i 's/compileSdkVersion = 35/compileSdkVersion = 36/g' variables.gradle
            sed -i 's/compileSdkVersion=35/compileSdkVersion=36/g' variables.gradle
            sed -i 's/targetSdkVersion = 35/targetSdkVersion = 36/g' variables.gradle
            sed -i 's/targetSdkVersion=35/targetSdkVersion=36/g' variables.gradle
            sed -i 's/minSdkVersion = 23/minSdkVersion = 24/g' variables.gradle
            sed -i 's/minSdkVersion=23/minSdkVersion=24/g' variables.gradle
            echo "=== variables.gradle ==="
            cat variables.gradle
          fi
          
          sed -i 's/compileSdk rootProject.ext.compileSdkVersion/compileSdk 36/g' app/build.gradle
          sed -i 's/targetSdkVersion rootProject.ext.targetSdkVersion/targetSdkVersion 36/g' app/build.gradle
          sed -i 's/minSdkVersion rootProject.ext.minSdkVersion/minSdkVersion 24/g' app/build.gradle
          
          echo "=== build.gradle ==="
          cat build.gradle
          echo "=== app/build.gradle ==="
          cat app/build.gradle

      - name: Grant execute permission for gradlew
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: receipt-manager-debug
          path: ./frontend/android/app/build/outputs/apk/debug/app-debug.apk